<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>claude-watch</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <script>
    // Apply saved theme before paint to avoid flash
    (function() {
      var t = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <header id="header">
    <div class="header-logo">W</div>
    <div class="header-title">claude-watch</div>
    <div class="header-search">
      <div class="search-wrap">
        <input type="text" id="search-input" placeholder="Search conversations..." autocomplete="off">
        <div id="search-spinner" class="search-spinner" hidden></div>
        <button id="search-clear" class="search-clear" hidden>&times;</button>
      </div>
      <div class="search-hint">Type words to search &middot; all words must match</div>
    </div>
    <button id="theme-toggle" class="theme-toggle" title="Toggle dark/light mode">☀</button>
  </header>
  <div id="app">
    <aside id="sidebar">
      <div class="sidebar-filter">
        <select id="project-filter">
          <option value="all">All projects</option>
        </select>
      </div>
      <div id="conversation-list" class="conversation-list"></div>
    </aside>
    <main id="main-panel">
      <div id="empty-state" class="empty-state">Select a conversation to view</div>
      <div id="session-header" class="session-header" hidden></div>
      <div id="message-thread" class="message-thread" hidden></div>
      <div id="memory-panel" hidden></div>
    </main>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
